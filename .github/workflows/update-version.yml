name: Update version
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Check for new release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(gh api repos/Sonarr/Sonarr/releases/latest --jq '.tag_name')
          LATEST="${LATEST_TAG#v}"
          CURRENT=$(grep 'version = "' flake.nix | head -1 | grep -o '"[^"]*"' | tr -d '"')
          echo "latest=${LATEST}" >> $GITHUB_OUTPUT
          echo "current=${CURRENT}" >> $GITHUB_OUTPUT
          if [ "$LATEST" != "$CURRENT" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "::notice::sonarr ${CURRENT} → ${LATEST}"
          fi

      - name: Update version and hash
        if: steps.check.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.check.outputs.latest }}"
          HASH=$(nix-prefetch-url --unpack "https://github.com/Sonarr/Sonarr/archive/refs/tags/v${VERSION}.tar.gz" 2>/dev/null)
          if [[ "$HASH" != sha256-* ]]; then
            HASH="sha256-$(nix hash convert --hash-algo sha256 --to base64 "$HASH" 2>/dev/null || echo "$HASH")"
          fi
          sed -i "s/version = \".*\"/version = \"${VERSION}\"/" flake.nix
          sed -i "s|srcHash = \".*\"|srcHash = \"${HASH}\"|" flake.nix

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          OLD="${{ steps.check.outputs.current }}"
          NEW="${{ steps.check.outputs.latest }}"
          git add flake.nix
          git commit -m "chore: sonarr ${OLD} → ${NEW}"
          git push origin main

      - name: Trigger build-publish workflow
        if: steps.check.outputs.changed == 'true'
        run: |
          gh workflow run build-publish.yml --ref main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
